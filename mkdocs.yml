site_name: Planner
site_description: A customisable weekly planner webapp
site_url: https://planner.tiogars.fr/docs/
repo_url: https://github.com/tiogars/planner
repo_name: tiogars/planner

edit_uri: edit/main/docs/

site_author: Tiogars
copyright: © 2026, Tiogars
site_dir: site_output

docs_dir: docs

theme:
  custom_dir: docs/overrides
  favicon: assets/images/favicon.png
  icon:
    repo: fontawesome/brands/github
  name: material
  highlightjs: true
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy
    - content.action.edit
    - content.action.view  

nav:
  - Home: index.md
  - 1. Specification:
    - Overview: 1-specification/index.md
    - 1.1 User Stories: 1-specification/1.1-user-stories/index.md
    - 1.2 Pages: 1-specification/1.2-pages/index.md
    - 1.3 Out of Scope: 1-specification/1.3-scope/index.md
  - 2. Architecture:
    - Overview: 2-architecture/index.md
    - 2.1 Technology Stack: 2-architecture/2.1-stack/index.md
    - 2.2 Directory Layout: 2-architecture/2.2-layout/index.md
    - 2.3 State Management: 2-architecture/2.3-state-management/index.md
    - 2.4 Routing: 2-architecture/2.4-routing/index.md
    - 2.5 Deployment: 2-architecture/2.5-deployment/index.md
  - 3. Workflows:
    - Overview: 3-workflows/index.md
    - 3.1 Continuous Integration: 3-workflows/3.1-ci/index.md
    - 3.2 Deploy to GitHub Pages: 3-workflows/3.2-deploy/index.md
    - 3.3 Create a Release: 3-workflows/3.3-release/index.md
    - 3.4 Docs Generation: 3-workflows/3.4-docs-generation/index.md

plugins:
  # https://squidfunk.github.io/mkdocs-material/setup/setting-up-site-search/?h=search#configuration
  - search:

  # https://pypi.org/project/mkdocs-include-markdown-plugin/
  - include-markdown:

  # https://pypi.org/project/mkdocs-kroki-plugin/
  - kroki:
      server_url: 'https://kroki.tiogars.fr'
      fence_prefix: 'kroki-'
      enable_block_diag: true
      enable_bpmn: false
      enable_excalidraw: true
      enable_mermaid: true
      fail_fast: false
      http_method: POST
      file_types:
        - png
        - svg
      file_type_overrides:
        nwdiag: svg
        mermaid: png
  - macros:

  # https://pypi.org/project/mkdocs-with-pdf/
  - to-pdf:
      author: Tiogars
      back_cover: true
      copyright: Copyright © Tiogars 2026
      cover: true
      cover_logo: assets/images/favicon.png
      cover_subtitle: Documentation
      cover_title: mkdocs-docker-image
      debug_html: true
      output_path: fr.tiogars.planner.pdf
  - print-site:
      add_to_navigation: false
      print_page_title: 'Print Site'
      print_page_basename: 'print_page'
      add_print_site_banner: false
      # Table of contents
      add_table_of_contents: true
      toc_title: 'Table of Contents'
      toc_depth: 6
      # Content-related
      add_full_urls: true
      enumerate_headings: true
      enumerate_figures: true
      add_cover_page: true
      cover_page_template: ""
      path_to_pdf: "fr.tiogars.planner.pdf"
      include_css: true
      enabled: true
      exclude: []

markdown_extensions:
  - admonition
  - abbr
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      #   # make exceptions to highlighting of code:
      # custom_fences:
      #   - name: mermaid
      #     class: mermaid
      #     format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde